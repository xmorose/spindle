<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spindle">
  <defs>
    <radialGradient id="disc" cx="38%" cy="34%" r="78%">
      <stop offset="0" stop-color="#2c2720"/>
      <stop offset=".55" stop-color="#1c1814"/>
      <stop offset="1" stop-color="#110e0b"/>
    </radialGradient>
    <radialGradient id="label" cx="40%" cy="36%" r="78%">
      <stop offset="0" stop-color="#ffb079"/>
      <stop offset="1" stop-color="#f7884a"/>
    </radialGradient>
    <clipPath id="rim"><circle cx="32" cy="32" r="31"/></clipPath>
  </defs>

  <circle cx="32" cy="32" r="31" fill="url(#disc)"/>

  <g fill="none" stroke="#000" stroke-opacity=".38">
    <circle cx="32" cy="32" r="28"/>
    <circle cx="32" cy="32" r="24.5"/>
    <circle cx="32" cy="32" r="21"/>
    <circle cx="32" cy="32" r="17.5"/>
  </g>

  <g clip-path="url(#rim)">
    <ellipse cx="20" cy="15" rx="27" ry="9" fill="#fff" opacity=".07" transform="rotate(-32 20 15)"/>
  </g>

  <circle cx="32" cy="32" r="13" fill="url(#label)"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#000" stroke-opacity=".18"/>
  <circle cx="32" cy="32" r="2.6" fill="#16120e"/>
</svg>
